<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Apply a saved "night edition" choice before paint to avoid a flash.
      // Default is the light paper canvas — no prefers-color-scheme auto-follow.
      (function () {
        try {
          if (localStorage.getItem('portfolio-theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark')
          }
        } catch (e) {}
      })()
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Ifeanyi Fredrick Okwuobi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..700&family=Libre+Franklin:ital,wght@0,300..800;1,400..600&family=Spline+Sans+Mono:wght@400..600&family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
